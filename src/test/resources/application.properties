# ===============================
# TEST APPLICATION
# ===============================
spring.application.name=adolfCoffee

# ===============================
# SERVER
# ===============================
server.port=8081
server.address=0.0.0.0

# ===============================
# H2 DATABASE (In-Memory)
# ===============================
spring.datasource.url=jdbc:h2:mem:drinkBase-db-test
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable optimistic locking for tests
spring.jpa.properties.hibernate.use_versioned_optimistic_locking=false

# ===============================
# H2 CONSOLE
# ===============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# JWT
# ===============================
jwt.secret=MySecretKeyForJWTTokenGenerationAndValidation1234567890
jwt.expiration=600000

